# Local development stack
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nic
      POSTGRES_USER: nic
      POSTGRES_PASSWORD: nic_local  # Dev only — not used in production
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nic"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      NIC_DATABASE_URL: postgresql+asyncpg://nic:nic_local@db:5432/nic
      NIC_S3_BUCKET: nic-local
      NIC_S3_ENDPOINT_URL: http://minio:9000
      NIC_S3_ACCESS_KEY_ID: minioadmin
      NIC_S3_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Check code scanning availability
        id: code_scanning
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(curl -sS -o /tmp/code-scanning-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")"

          if [ "$status" = "200" ] || [ "$status" = "202" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code scanning API is enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning API unavailable (HTTP ${status}); skipping CodeQL upload."
          fi

      - uses: actions/checkout@v6
        if: steps.code_scanning.outputs.enabled == 'true'
      - name: Initialize CodeQL
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: astral-sh/setup-uv@v7
        if: steps.code_scanning.outputs.enabled == 'true'
        with:
          version: "0.9.x"
          enable-cache: true
      - if: steps.code_scanning.outputs.enabled == 'true'
        run: uv sync --frozen --extra ml

      - name: Perform CodeQL Analysis
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4

      - name: Skip CodeQL when repository code scanning is disabled
        if: steps.code_scanning.outputs.enabled != 'true'
        run: echo "Skipping CodeQL analysis because code scanning is not enabled for this repository."

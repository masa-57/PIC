name: CI/CD

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.9.x"
          enable-cache: true
      - run: uv sync --frozen --extra ml
      - run: uv run ruff check src/ tests/ scripts/
      - run: uv run ruff format --check src/ tests/ scripts/
      - run: uv lock --check
      - run: uv run mypy src/pic/
      - run: uv run pip-audit

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build Railway image for scan
        run: docker build -f Dockerfile.railway -t pic-api:scan .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # 0.34.0
        with:
          image-ref: pic-api:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL,HIGH

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.9.x"
          enable-cache: true
          prune-cache: false
      - run: uv sync --frozen --extra ml
      - run: uv run pytest -m unit --cov=src/pic --cov-report=xml --cov-fail-under=70 -v
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: pic_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.9.x"
          enable-cache: true
          prune-cache: false
      - run: uv sync --frozen --extra ml
      - name: Ensure pgvector extension exists
        run: |
          uv run python - <<'PY'
          import time

          import psycopg2

          dsn = "postgresql://postgres:test@localhost:5432/pic_test"
          last_error = None
          for _ in range(10):
              try:
                  conn = psycopg2.connect(dsn)
                  conn.autocommit = True
                  with conn.cursor() as cur:
                      cur.execute("CREATE EXTENSION IF NOT EXISTS vector")
                  conn.close()
                  break
              except psycopg2.OperationalError as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"Failed to initialize pgvector extension: {last_error}")
          PY
      - name: Apply migrations before integration tests
        run: uv run alembic upgrade head
        env:
          PIC_DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/pic_test
      - name: Run integration tests
        run: uv run pytest -m integration --cov=src/pic --cov-report=xml:coverage-integration.xml --cov-fail-under=45 -v
        env:
          PIC_DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/pic_test
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: coverage-integration-report
          path: coverage-integration.xml

  coverage-report:
    if: always()
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Display coverage files
        run: ls -la *.xml
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: combined-coverage
          path: "*.xml"

  deploy-modal:
    if: github.ref == 'refs/heads/main'
    needs: [lint, unit-test, integration-test, container-scan]
    runs-on: ubuntu-latest
    outputs:
      rollback_sha: ${{ steps.rollback_sha.outputs.sha }}
    concurrency:
      group: deploy-modal-main
      cancel-in-progress: false
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Determine rollback SHA
        id: rollback_sha
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            echo "sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.9.x"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run modal deploy src/pic/modal_app.py --tag "${GITHUB_SHA}"

  post-deploy-smoke:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-modal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install httpx
        run: pip install httpx
      - name: Run smoke tests
        env:
          PRODUCTION_API_URL_SECRET: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_API_URL_VAR: ${{ vars.PRODUCTION_API_URL }}
        run: |
          API_URL="${PRODUCTION_API_URL_SECRET:-$PRODUCTION_API_URL_VAR}"
          if [ -z "$API_URL" ]; then
            echo "::warning::Skipping smoke tests because PRODUCTION_API_URL is not configured (set repository secret or variable)."
            exit 0
          fi
          python scripts/smoke_test.py "$API_URL"

  rollback-modal:
    if: github.ref == 'refs/heads/main' && always() && needs.post-deploy-smoke.result == 'failure'
    needs: [deploy-modal, post-deploy-smoke]
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.deploy-modal.outputs.rollback_sha }}
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.9.x"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run modal deploy src/pic/modal_app.py --tag "rollback-${{ needs.deploy-modal.outputs.rollback_sha }}"

  # Railway auto-deploys from GitHub push — no step needed

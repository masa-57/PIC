name: Debt Register Audit

on:
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Validate debt register integrity
        id: validate
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/debt_sync.py validate --strict --check-github --owner masa-57 --repo NIC
      - name: Build debt report artifacts
        run: python3 scripts/debt_sync.py report --out-dir debt-report
      - name: Open/Update debt drift issue on failure
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Debt register drift detected";
            const existingOpenIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = existingOpenIssues.find((issue) => issue.title === title);
            const body = [
              "Automated debt audit detected integrity drift in `docs/audit/debt_register_148.csv`.",
              "",
              `Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              "",
              "Next actions:",
              "1. Review audit logs and artifact `debt-register-audit`",
              "2. Run `python3 scripts/debt_sync.py validate --strict --check-github --owner masa-57 --repo NIC` locally",
              "3. Fix register inconsistencies and re-run workflow",
            ].join("\\n");
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }
      - name: Fail job when validation fails
        if: steps.validate.outcome == 'failure'
        run: exit 1
      - uses: actions/upload-artifact@v6
        with:
          name: debt-register-audit
          path: debt-report/
